name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      build_mode:
        description: Which package(s) to build
        required: true
        type: choice
        default: both
        options:
          - both
          - onefile
          - onedir
      sign_with_signpath:
        description: Submit the onefile artifact to SignPath
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

jobs:
  build-onefile:
    if: github.event_name != 'workflow_dispatch' || inputs.build_mode == 'both' || inputs.build_mode == 'onefile'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Install build dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements-build.txt

      - name: Build onefile package
        shell: pwsh
        run: .\build_pyside6_app.ps1 -Mode onefile

      - name: Upload unsigned onefile artifact
        id: upload_unsigned_onefile
        uses: actions/upload-artifact@v4
        with:
          name: CrimsonDesertModWorkbench-onefile-unsigned
          path: dist/CrimsonDesertModWorkbench-*-windows-portable.exe
          if-no-files-found: error

      - name: Validate SignPath settings
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_signpath
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
        run: |
          $missing = @()
          if (-not $env:SIGNPATH_API_TOKEN) { $missing += "SIGNPATH_API_TOKEN secret" }
          if (-not $env:SIGNPATH_ORGANIZATION_ID) { $missing += "SIGNPATH_ORGANIZATION_ID variable" }
          if (-not $env:SIGNPATH_PROJECT_SLUG) { $missing += "SIGNPATH_PROJECT_SLUG variable" }
          if (-not $env:SIGNPATH_SIGNING_POLICY_SLUG) { $missing += "SIGNPATH_SIGNING_POLICY_SLUG variable" }
          if ($missing.Count -gt 0) {
            throw "Missing SignPath configuration: $($missing -join ', ')"
          }

      - name: Submit onefile artifact to SignPath
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_signpath && vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG == ''
        id: signpath_default
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned_onefile.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-artifacts/onefile

      - name: Submit onefile artifact to SignPath (custom artifact config)
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_signpath && vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG != ''
        id: signpath_custom
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned_onefile.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-artifacts/onefile

      - name: Upload signed onefile artifact
        if: steps.signpath_default.outcome == 'success' || steps.signpath_custom.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: CrimsonDesertModWorkbench-onefile-signed
          path: signed-artifacts/onefile/**
          if-no-files-found: error

  build-onedir:
    if: github.event_name != 'workflow_dispatch' || inputs.build_mode == 'both' || inputs.build_mode == 'onedir'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Install build dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements-build.txt

      - name: Build onedir package
        shell: pwsh
        run: .\build_pyside6_app.ps1 -Mode onedir

      - name: Upload unsigned onedir artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrimsonDesertModWorkbench-onedir-unsigned
          path: dist/CrimsonDesertModWorkbench-*-windows
          if-no-files-found: error
